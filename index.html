.question{font-size:20px;margin-bottom:10px}
.hidden{display:none}
.result{text-align:center}
.result img{width:200px;border-radius:14px;margin-top:10px}
.rank{margin-top:20px;text-align:left}
.rank-item{padding:8px 0;border-bottom:1px solid #eee}
.percent{float:right;color:#666}
.actions{margin-top:22px}
.secondary{background:#eee;color:black;margin-left:10px}
.badge{display:inline-block;background:#eee;padding:4px 10px;border-radius:20px;margin:3px;font-size:12px}
</style>

/* ============================
用户数据
============================ */

let user={}
let personality={}
let index=0


const profileScreen=document.getElementById("profileScreen")
const quizScreen=document.getElementById("quizScreen")
const resultScreen=document.getElementById("resultScreen")

const questionBox=document.getElementById("questionBox")
const optionsBox=document.getElementById("optionsBox")
const progressBar=document.getElementById("progressBar")


function startQuiz(){

user.zodiac=document.getElementById("zodiac").value
user.mbti=document.getElementById("mbti").value.toUpperCase()
user.blood=document.getElementById("blood").value
user.bazi=document.getElementById("bazi").value

profileScreen.classList.add("hidden")
quizScreen.classList.remove("hidden")

renderQuestion()

}


function renderQuestion(){

const q=QUESTIONS[index]

progressBar.style.width=(index/QUESTIONS.length*100)+"%"

questionBox.innerHTML=`<div class="question">${q.question}</div>`
optionsBox.innerHTML=""

q.options.forEach(opt=>{

const btn=document.createElement("button")
btn.className="option"
btn.innerText=opt.text

btn.onclick=()=>{

if(!personality[opt.value]) personality[opt.value]=0
personality[opt.value]++

index++

if(index<QUESTIONS.length){
renderQuestion()
}else{
calculate()
}

}

optionsBox.appendChild(btn)

})

}


/* ============================
匹配算法 (严格按权重执行)
============================ */
function calculate() {
  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");

  let ranking = [];

  for (const name in IDOLS) {
    const idol = IDOLS[name];
    let score = 0;

    // 1. 八字权重 (最高: +15)
    const fav = baziMap[user.bazi] || [];
    fav.forEach(v => {
      // 偶像的element(五行)如果正好是用户八字喜欢的五行
      if (v.includes("火") && idol.traits.element === "fire") score += 15;
      if (v.includes("水") && idol.traits.element === "water") score += 15;
      if (v.includes("木") && idol.traits.element === "air") score += 15; // 原代码用air代指木，沿用你的逻辑
      if (v.includes("金") && idol.traits.element === "metal") score += 15;
      if (v.includes("土") && idol.traits.element === "earth") score += 15;
    });

    // 2. MBTI权重 (次高: 绝配+12, 同款+8)
    if (mbtiMatch[user.mbti] && mbtiMatch[user.mbti].includes(idol.traits.mbti)) {
      score += 12; // 绝配
    } else if (idol.traits.mbti === user.mbti) {
      score += 8;  // 同款性格
    }

    // 3. 星座权重 (中等: 绝配+8, 同象系+4)
    if (zodiacMatch[user.zodiac] && zodiacMatch[user.zodiac].includes(idol.traits.zodiac)) {
      score += 8; // 星座高度契合
    }
    const userElement = zodiacElement[user.zodiac];
    if (idol.traits.element === userElement) {
      score += 4; // 同为风/火/水/土象星座
    }

    // 4. 血型权重 (最低: 相同+3)
    if (idol.traits.blood === user.blood) {
      score += 3;
    }

    // 5. 附加分：性格测试问答得分 (每题契合+2)
    if (personality[idol.traits.energy]) {
      score += personality[idol.traits.energy] * 2;
    }

    ranking.push({ name, score });
  }

  // 按照分数从高到低排序
  ranking.sort((a, b) => b.score - a.score);

  // 防御性处理：防止所有得分都为0的情况
  let maxScore = ranking[0].score;
  if (maxScore === 0) maxScore = 1; 

  let rankHTML = "";
  ranking.forEach((r, i) => {
    // 限制最高百分比不超过99%，让结果显得更真实
    let percent = Math.min(Math.round((r.score / maxScore) * 99), 99); 
    if(i === 0) percent = 99; // 第一名强制99%
    rankHTML += `<div class='rank-item'>${i + 1}. ${r.name} <span class='percent'>契合度 ${percent}%</span></div>`;
  });

  const best = ranking[0];

  resultScreen.innerHTML = `
    <h2>✨ 你的本命偶像 ✨</h2>
    <h1>${best.name}</h1>
    <img src="${IDOLS[best.name].img}">
    
    <div class="rank">
      <h3>匹配度排行榜</h3>
      ${rankHTML}
    </div>
    
    <div class="actions">
      <button onclick="location.reload()">重新测试</button>
      <button class="secondary" onclick="share('${best.name}')">分享结果</button>
    </div>
  `;
}

}


function share(name){

const text=`我测出来最匹配的KPOP偶像是 ${name}！快来算算你的本命idol！`

navigator.clipboard.writeText(text)

alert("分享文案已复制，可以发小红书/微博")

}
