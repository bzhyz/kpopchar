/* ============================

============================ */

  {

/* ============================

let user = {};
let personality = {};
let index = 0;

const profileScreen = document.getElementById("profileScreen");
const quizScreen = document.getElementById("quizScreen");
const resultScreen = document.getElementById("resultScreen");
const questionBox = document.getElementById("questionBox");
const optionsBox = document.getElementById("optionsBox");
const progressBar = document.getElementById("progressBar");

function startQuiz() {
  user.zodiac = document.getElementById("zodiac").value;
  user.mbti = document.getElementById("mbti").value.toUpperCase();
  user.blood = document.getElementById("blood").value;
  user.bazi = document.getElementById("bazi").value;

  if(!user.mbti || user.mbti.length !== 4) {
    alert("请输入正确的4位MBTI代码");
    return;
  }

  profileScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[index];
  progressBar.style.width = (index / QUESTIONS.length * 100) + "%";
  questionBox.innerHTML = `<div class="question">${q.question}</div>`;
  optionsBox.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt.text;
    btn.onclick = () => {
      if (!personality[opt.value]) personality[opt.value] = 0;
      personality[opt.value]++;
      index++;
      if (index < QUESTIONS.length) { renderQuestion(); } else { calculate(); }
    };
    optionsBox.appendChild(btn);
  });
}

const zodiacMatch = {
  "aries": ["leo", "sagittarius", "gemini", "aquarius"], "taurus": ["virgo", "capricorn", "cancer", "pisces"],
  "gemini": ["libra", "aquarius", "aries", "leo"], "cancer": ["scorpio", "pisces", "taurus", "virgo"],
  "leo": ["aries", "sagittarius", "gemini", "libra"], "virgo": ["taurus", "capricorn", "cancer", "scorpio"],
  "libra": ["gemini", "aquarius", "leo", "sagittarius"], "scorpio": ["cancer", "pisces", "virgo", "capricorn"],
  "sagittarius": ["aries", "leo", "libra", "aquarius"], "capricorn": ["taurus", "virgo", "scorpio", "pisces"],
  "aquarius": ["gemini", "libra", "aries", "sagittarius"], "pisces": ["cancer", "scorpio", "taurus", "capricorn"]
};


/* ============================
匹配算法 (严格按权重执行)
============================ */
function calculate() {
  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");
  let ranking = [];

  for (const name in IDOLS) {
    const idol = IDOLS[name];
    let score = 0;
    const fav = baziMap[user.bazi] || [];
    fav.forEach(v => {
      if (v.includes("火") && idol.traits.element === "fire") score += 15;
      if (v.includes("水") && idol.traits.element === "water") score += 15;
      if (v.includes("木") && idol.traits.element === "air") score += 15;
      if (v.includes("金") && idol.traits.element === "metal") score += 15;
      if (v.includes("土") && idol.traits.element === "earth") score += 15;
    });

    if (mbtiMatch[user.mbti] && mbtiMatch[user.mbti].includes(idol.traits.mbti)) { score += 12; }
    else if (idol.traits.mbti === user.mbti) { score += 8; }

    if (zodiacMatch[user.zodiac] && zodiacMatch[user.zodiac].includes(idol.traits.zodiac)) { score += 8; }
    if (idol.traits.element === zodiacElement[user.zodiac]) { score += 4; }
    if (idol.traits.blood === user.blood) { score += 3; }
    if (personality[idol.traits.energy]) { score += personality[idol.traits.energy] * 2; }

    ranking.push({ name, score });
  }

  ranking.sort((a, b) => b.score - a.score);
  let maxScore = ranking[0].score || 1;
  let rankHTML = "";
  ranking.slice(0, 5).forEach((r, i) => {
    let percent = Math.min(Math.round((r.score / maxScore) * 99), 99);
    if(i === 0) percent = 99;
    rankHTML += `<div class='rank-item'>${i + 1}. ${r.name} <span class='percent'>契合度 ${percent}%</span></div>`;
  });

  const best = ranking[0];
  resultScreen.innerHTML = `
    <h2>✨ 你的本命偶像 ✨</h2>
    <h1 style="font-size:32px">${best.name}</h1>
    <img src="${IDOLS[best.name].img}" style="width:250px; border-radius:20px; box-shadow:0 10px 20px rgba(0,0,0,0.2)">
    <div class="rank"><h3>匹配度排行榜</h3>${rankHTML}</div>
    <div class="actions">
      <button onclick="location.reload()">重新测试</button>
      <button class="secondary" onclick="share('${best.name}')">分享结果</button>
    </div>
  `;
}

function share(name) {
  const text = `我测出来最匹配的KPOP偶像是 ${name}！快来算算你的本命idol！`;
  navigator.clipboard.writeText(text);
  alert("分享文案已复制，可以发小红书/微博");
}
